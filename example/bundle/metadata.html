            * {

			#container {

				left: 0;

				color: white;
				font-family: monospace;
				opacity: 0.75;
				font-size: 12px;
			}

			#info, #meshFeatures, #structuralMetadata {

				display: inline-block;
				background-color: rgba( 0, 0, 0, 0.5 );
				border-radius: 2px;
				white-space: pre;
				margin: 5px;
				padding: 5px;

			}

			#info, #info a {

				white-space: initial;
				color: white;

			}

			#info a {

				pointer-events: all;

			}

			#meshFeatures:empty, #structuralMetadata:empty {

				display: none;

			}
