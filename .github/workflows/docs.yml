# Build and deploy documentation site (docs-system) to GitHub Pages

name: Deploy Documentation

on:
  push:
    branches: [master, improve-JSDoc]
    paths:
      - 'src/**'
      - 'example/**'
      - 'docs-system/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --prefer-offline

      - name: Install docs-system dependencies
        run: npm ci --prefer-offline
        working-directory: docs-system

      - name: Build documentation
        run: npm run build
        working-directory: docs-system

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/api'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
